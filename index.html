<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Mensal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        /* Seletor de Mês Ativo */
        .filtro-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
        }

        .filtro-container label {
            font-weight: bold;
            color: #495057;
        }

        .filtro-container input[type="month"] {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Dashboard */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            background: #fff;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card h3 {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card h2 { font-size: 24px; }
        .receitas h2 { color: #2ecc71; }
        .despesas h2 { color: #e74c3c; }
        .saldo h2 { color: #3498db; }

        /* Formulário */
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }

        select { flex: 1; min-width: 120px; }
        input[type="text"] { flex: 2; min-width: 200px; }
        input[type="number"] { flex: 1; min-width: 100px; }
        input[type="date"] { flex: 1; min-width: 130px; }

        .btn-adicionar {
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
            min-width: 120px;
        }
        .btn-adicionar:hover { background: #219653; }

        /* Ações extras (Exportar) */
        .acoes-tabela {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .btn-exportar {
            background: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-exportar:hover { background: #2471a3; }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: 600;
        }

        .btn-remover {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-remover:hover { background: #c0392b; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }
        .badge.receita { background: #2ecc71; }
        .badge.despesa { background: #e74c3c; }
        
        .sem-dados {
            text-align: center;
            color: #95a5a6;
            padding: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Controle Financeiro Mensal</h1>

        <div class="filtro-container">
            <label for="mes-filtro">Mês de Referência:</label>
            <input type="month" id="mes-filtro">
        </div>

        <div class="dashboard">
            <div class="card receitas">
                <h3>Recebido no Mês</h3>
                <h2 id="total-receitas">R$ 0,00</h2>
            </div>
            <div class="card despesas">
                <h3>Gasto no Mês</h3>
                <h2 id="total-despesas">R$ 0,00</h2>
            </div>
            <div class="card saldo">
                <h3>Saldo do Mês</h3>
                <h2 id="saldo-atual">R$ 0,00</h2>
            </div>
        </div>

        <form id="form-transacao" class="form-group">
            <select id="tipo" required>
                <option value="despesa">Despesa (Saída)</option>
                <option value="receita">Receita (Entrada)</option>
            </select>
            <input type="text" id="descricao" placeholder="Descrição (ex: Aluguel, Mercado, Cigarro)" required>
            <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
            <input type="date" id="data-lancamento" required>
            <button type="submit" class="btn-adicionar">Adicionar</button>
        </form>

        <div class="acoes-tabela">
            <button class="btn-exportar" onclick="exportarParaExcel()">📥 Exportar Mês para Excel</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista-transacoes">
                </tbody>
        </table>
    </div>

    <script>
        // Banco de dados simulado no navegador
        let transacoes = JSON.parse(localStorage.getItem('transacoesMensaisRamon')) || [];

        // Ao carregar a página, define o seletor para o mês/ano atual do seu computador
        const hoje = new Date();
        const anoAtual = hoje.getFullYear();
        const mesAtual = String(hoje.getMonth() + 1).padStart(2, '0');
        
        const seletorMes = document.getElementById('mes-filtro');
        seletorMes.value = `${anoAtual}-${mesAtual}`;
        
        // Define a data padrão do formulário para o dia de hoje
        document.getElementById('data-lancamento').value = hoje.toISOString().split('T')[0];

        // Formatador de Moeda Brasileira
        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        };

        // Formata a data de AAAA-MM-DD para DD/MM/AAAA
        const formatarDataBR = (dataString) => {
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        };

        // Função principal que atualiza a tela baseada no mês selecionado
        const atualizarInterface = () => {
            const lista = document.getElementById('lista-transacoes');
            lista.innerHTML = '';

            const mesSelecionado = seletorMes.value; // Formato "AAAA-MM"

            // Filtra apenas as transações que pertencem ao mês selecionado
            const transacoesDoMes = transacoes.filter(t => t.data.startsWith(mesSelecionado));

            // Ordena as transações por data (mais recentes primeiro ou ordem cronológica)
            transacoesDoMes.sort((a, b) => new Date(a.data) - new Date(b.data));

            let totalReceitas = 0;
            let totalDespesas = 0;

            if (transacoesDoMes.length === 0) {
                lista.innerHTML = `<tr><td colspan="5" class="sem-dados">Nenhum lançamento encontrado para este mês.</td></tr>`;
            } else {
                transacoesDoMes.forEach((transacao) => {
                    if (transacao.tipo === 'receita') {
                        totalReceitas += transacao.valor;
                    } else {
                        totalDespesas += transacao.valor;
                    }

                    const tr = document.createElement('tr');
                    const tipoClasse = transacao.tipo === 'receita' ? 'badge receita' : 'badge despesa';
                    const tipoTexto = transacao.tipo === 'receita' ? 'Receita' : 'Despesa';

                    tr.innerHTML = `
                        <td>${formatarDataBR(transacao.data)}</td>
                        <td><span class="${tipoClasse}">${tipoTexto}</span></td>
                        <td>${transacao.descricao}</td>
                        <td>${formatarMoeda(transacao.valor)}</td>
                        <td><button class="btn-remover" onclick="removerTransacao('${transacao.id}')">Excluir</button></td>
                    `;
                    lista.appendChild(tr);
                });
            }

            // Atualiza os painéis numéricos
            const saldo = totalReceitas - totalDespesas;
            document.getElementById('total-receitas').innerText = formatarMoeda(totalReceitas);
            document.getElementById('total-despesas').innerText = formatarMoeda(totalDespesas);
            document.getElementById('saldo-atual').innerText = formatarMoeda(saldo);

            // Cor do saldo (Verde se positivo, Vermelho se negativo)
            document.getElementById('saldo-atual').style.color = saldo < 0 ? '#e74c3c' : '#2ecc71';

            // Salva a lista global atualizada no LocalStorage
            localStorage.setItem('transacoesMensaisRamon', JSON.stringify(transacoes));
        };

        // Escuta a mudança de mês no seletor para recalcular tudo
        seletorMes.addEventListener('change', atualizarInterface);

        // Adicionar novo item
        document.getElementById('form-transacao').addEventListener('submit', function(e) {
            e.preventDefault();

            const tipo = document.getElementById('tipo').value;
            const descricao = document.getElementById('descricao').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const data = document.getElementById('data-lancamento').value;

            // Cria um ID único para cada item para facilitar a exclusão segura
            const id = Date.now().toString();

            transacoes.push({ id, tipo, descricao, valor, data });

            // Limpa os campos de descrição e valor, mantém a data
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';

            // Força o seletor de mês a ir para o mês do item que você acabou de adicionar
            const anoMesDoLancamento = data.substring(0, 7);
            seletorMes.value = anoMesDoLancamento;

            atualizarInterface();
        });

        // Remover item usando o ID único
        const removerTransacao = (id) => {
            if(confirm("Tem certeza que deseja excluir este lançamento?")) {
                transacoes = transacoes.filter(t => t.id !== id);
                atualizarInterface();
            }
        };

        // Função mágica para exportar para o Excel (.csv)
        const exportarParaExcel = () => {
            const mesSelecionado = seletorMes.value;
            const transacoesDoMes = transacoes.filter(t => t.data.startsWith(mesSelecionado));

            if (transacoesDoMes.length === 0) {
                alert("Não há dados para exportar neste mês!");
                return;
            }

            // Monta o arquivo CSV. O '\uFEFF' serve para o Excel abrir com acentos corretos (UTF-8)
            let conteudoCSV = '\uFEFF';
            // Cabeçalho das colunas no Excel (usando ponto e vírgula que é o padrão do Excel em português)
            conteudoCSV += 'Data;Tipo;Descrição;Valor (R$)\n';

            transacoesDoMes.forEach(t => {
                const dataFormatada = formatarDataBR(t.data);
                const tipoTexto = t.tipo === 'receita' ? 'Receita' : 'Despesa';
                // Converte o valor para o padrão com vírgula para o Excel entender como número
                const valorFormatado = t.valor.toFixed(2).replace('.', ',');
                
                conteudoCSV += `${dataFormatada};${tipoTexto};${t.descricao};${valorFormatado}\n`;
            });

            // Cria o link de download invisível no navegador
            const blob = new Blob([conteudoCSV], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `Controle_Financeiro_${mesSelecionado}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // Inicializa a aplicação
        atualizarInterface();
    </script>
</body>
</html>
