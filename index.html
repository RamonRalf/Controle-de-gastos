<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Financeiro Mensal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 10px; /* Reduzido para celular */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* Seletor de Mês Ativo */
        .filtro-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .filtro-container input[type="month"] {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Dashboard */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            background: #fff;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card h3 {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .card h2 { font-size: 20px; }
        .receitas h2 { color: #2ecc71; }
        .despesas h2 { color: #e74c3c; }
        .saldo h2 { color: #3498db; }

        /* Formulário */
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }

        /* Controle de tamanho no Desktop */
        @media (min-width: 600px) {
            select { flex: 1; width: auto; }
            input[type="text"] { flex: 2; width: auto; }
            input[type="number"] { flex: 1; width: auto; }
            input[type="date"] { flex: 1; width: auto; }
            .btn-adicionar { flex: 1; width: auto; }
        }

        .btn-adicionar {
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-adicionar:hover { background: #219653; }

        .acoes-tabela {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .btn-exportar {
            background: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 6px;
            width: 100%;
        }

        @media (min-width: 600px) {
            .btn-exportar { width: auto; }
        }

        /* Tabela Responsiva */
        .tabela-wrapper {
            width: 100%;
            overflow-x: auto; /* Permite rolar a tabela no celular se for grande */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px; /* Garante que a tabela não esmague os dados */
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: 600;
        }

        .btn-remover {
            background: #e74c3c;
            color: white;
            padding: 5px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .badge {
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: white;
            display: inline-block;
        }
        .badge.receita { background: #2ecc71; }
        .badge.despesa { background: #e74c3c; }
        
        /* === CORREÇÕES PARA CELULAR (Tirar rolagem lateral) === */
        @media (max-width: 600px) {
            .dashboard {
                flex-direction: column; /* Coloca os cartões um embaixo do outro */
                gap: 10px;
            }
            .form-group {
                flex-direction: column; /* Inputs um embaixo do outro */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 Controle Financeiro</h1>

        <div class="filtro-container">
            <label for="mes-filtro">Mês:</label>
            <input type="month" id="mes-filtro">
        </div>

        <div class="dashboard">
            <div class="card receitas">
                <h3>Recebido no Mês</h3>
                <h2 id="total-receitas">R$ 0,00</h2>
            </div>
            <div class="card despesas">
                <h3>Gasto no Mês</h3>
                <h2 id="total-despesas">R$ 0,00</h2>
            </div>
            <div class="card saldo">
                <h3>Saldo do Mês</h3>
                <h2 id="saldo-atual">R$ 0,00</h2>
            </div>
        </div>

        <form id="form-transacao" class="form-group">
            <select id="tipo" required>
                <option value="despesa">Despesa (Saída)</option>
                <option value="receita">Receita (Entrada)</option>
            </select>
            <input type="text" id="descricao" placeholder="Descrição (ex: Aluguel)" required>
            <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
            <input type="date" id="data-lancamento" required>
            <button type="submit" class="btn-adicionar">Adicionar</button>
        </form>

        <div class="acoes-tabela">
            <button class="btn-exportar" onclick="exportarParaExcel()">📥 Exportar para Excel</button>
        </div>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Tipo</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-transacoes"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Registrar o Service Worker para habilitar a instalação do App no celular
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => {
                console.log('Service Worker Registrado!');
            });
        }

        let transacoes = JSON.parse(localStorage.getItem('transacoesMensaisRamon')) || [];
        const hoje = new Date();
        const anoAtual = hoje.getFullYear();
        const mesAtual = String(hoje.getMonth() + 1).padStart(2, '0');
        
        const seletorMes = document.getElementById('mes-filtro');
        seletorMes.value = `${anoAtual}-${mesAtual}`;
        document.getElementById('data-lancamento').value = hoje.toISOString().split('T')[0];

        const formatarMoeda = (valor) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        const formatarDataBR = (dataString) => {
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}`; // No celular, mostrar só dia/mês economiza espaço
        };

        const atualizarInterface = () => {
            const lista = document.getElementById('lista-transacoes');
            lista.innerHTML = '';

            const mesSelecionado = seletorMes.value;
            const transacoesDoMes = transacoes.filter(t => t.data.startsWith(mesSelecionado));
            transacoesDoMes.sort((a, b) => new Date(a.data) - new Date(b.data));

            let totalReceitas = 0; let totalDespesas = 0;

            if (transacoesDoMes.length === 0) {
                lista.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">Nenhum lançamento.</td></tr>`;
            } else {
                transacoesDoMes.forEach((transacao) => {
                    if (transacao.tipo === 'receita') totalReceitas += transacao.valor;
                    else totalDespesas += transacao.valor;

                    const tr = document.createElement('tr');
                    const tipoClasse = transacao.tipo === 'receita' ? 'badge receita' : 'badge despesa';
                    const tipoTexto = transacao.tipo === 'receita' ? 'Rec' : 'Desp'; // Encurtado para celular

                    tr.innerHTML = `
                        <td>${formatarDataBR(transacao.data)}</td>
                        <td><span class="${tipoClasse}">${tipoTexto}</span></td>
                        <td>${transacao.descricao}</td>
                        <td>${formatarMoeda(transacao.valor)}</td>
                        <td><button class="btn-remover" onclick="removerTransacao('${transacao.id}')">Excluir</button></td>
                    `;
                    lista.appendChild(tr);
                });
            }

            const saldo = totalReceitas - totalDespesas;
            document.getElementById('total-receitas').innerText = formatarMoeda(totalReceitas);
            document.getElementById('total-despesas').innerText = formatarMoeda(totalDespesas);
            document.getElementById('saldo-atual').innerText = formatarMoeda(saldo);
            document.getElementById('saldo-atual').style.color = saldo < 0 ? '#e74c3c' : '#2ecc71';

            localStorage.setItem('transacoesMensaisRamon', JSON.stringify(transacoes));
        };

        seletorMes.addEventListener('change', atualizarInterface);

        document.getElementById('form-transacao').addEventListener('submit', function(e) {
            e.preventDefault();
            const tipo = document.getElementById('tipo').value;
            const descricao = document.getElementById('descricao').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const data = document.getElementById('data-lancamento').value;
            const id = Date.now().toString();

            transacoes.push({ id, tipo, descricao, valor, data });
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            seletorMes.value = data.substring(0, 7);
            atualizarInterface();
        });

        const removerTransacao = (id) => {
            if(confirm("Excluir este lançamento?")) {
                transacoes = transacoes.filter(t => t.id !== id);
                atualizarInterface();
            }
        };

        const exportarParaExcel = () => {
            const mesSelecionado = seletorMes.value;
            const transacoesDoMes = transacoes.filter(t => t.data.startsWith(mesSelecionado));
            if (transacoesDoMes.length === 0) return alert("Não há dados!");

            let conteudoCSV = '\uFEFFData;Tipo;Descrição;Valor (R$)\n';
            transacoesDoMes.forEach(t => {
                const dataFormatada = t.data.split('-').reverse().join('/');
                const tipoTexto = t.tipo === 'receita' ? 'Receita' : 'Despesa';
                const valorFormatado = t.valor.toFixed(2).replace('.', ',');
                conteudoCSV += `${dataFormatada};${tipoTexto};${t.descricao};${valorFormatado}\n`;
            });

            const blob = new Blob([conteudoCSV], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Controle_${mesSelecionado}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        atualizarInterface();
    </script>
</body>
</html>
